name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' ServiceBusConsole.csproj)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag release
        if: steps.tag_check.outputs.EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Build
        if: steps.tag_check.outputs.EXISTS == 'false'
        run: dotnet build --configuration Release

      - name: Pack
        if: steps.tag_check.outputs.EXISTS == 'false'
        run: |
          dotnet pack ServiceBusConsole.csproj --configuration Release --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./artifacts

      - name: Push to NuGet
        if: steps.tag_check.outputs.EXISTS == 'false'
        run: dotnet nuget push ./artifacts/Net.Azure.ServiceBusConsole.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
